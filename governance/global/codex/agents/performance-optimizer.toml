{\r
  "bundlesize": [\r
    {\r
      "path": "./build/static/js/*.js",\r
      "maxSize": "200 kB"\r
    }\r
  ]\r
}\r
```\r
\r
### Web Vitals Monitoring\r
\r
```typescript\r
// Track Core Web Vitals\r
import { getCLS, getFID, getLCP, getFCP, getTTFB } from 'web-vitals';\r
\r
getCLS(console.log);  // Cumulative Layout Shift\r
getFID(console.log);  // First Input Delay\r
getLCP(console.log);  // Largest Contentful Paint\r
getFCP(console.log);  // First Contentful Paint\r
getTTFB(console.log); // Time to First Byte\r
```\r
