# Default install profile for the AI Workspace Constitution.
#
# Resolution order at install time (highest wins):
#   1. CLI flags
#   2. Environment variables (WORKSPACE_ROOT, ...)
#   3. manifests/machine.local.yaml (per-machine, gitignored)
#   4. manifests/default.yaml (this file, the canonical baseline)
#
# Each component declares:
#   sources : list of template files or directories under governance/
#   target  : absolute or ${VAR}-templated destination on the target machine
#   mode    : write strategy (default: replace; alternatives: append, marker-section)
#   os      : optional OS allow-list  (windows | macos | linux)
#   harness : optional harness allow-list (codex | claude | gemini | cursor | trae | kiro | opencode)

constitution:
  version: "0.2.0"

paths:
  # Required at install time.
  # Bash: WORKSPACE_ROOT=/path/to/workspace ./scripts/install.sh
  # PowerShell: $env:WORKSPACE_ROOT = "D:\path"; .\scripts\install.ps1
  workspace_root: "${WORKSPACE_ROOT}"
  # Auto-detected from $HOME (Unix) or $env:USERPROFILE (Windows) at install time.
  user_home: "${HOME}"
  # Repo-owned overlay for the DragonPow2 multi-project workspace.
  # Override this in manifests/machine.local.yaml if the repo is not under WORKSPACE_ROOT.
  dragonpow2_root: "${WORKSPACE_ROOT}/DragonPow2"

components:

  # ── Workspace top-level governance ─────────────────────────────────
  workspace_governance:
    enabled: true
    description: "Top-level AGENTS.md / CLAUDE.md / GEMINI.md / README_AI_GOVERNANCE.md"
    sources:
      - governance/workspace/AGENTS.md.tmpl
      - governance/workspace/CLAUDE.md.tmpl
      - governance/workspace/GEMINI.md.tmpl
      - governance/workspace/README_AI_GOVERNANCE.md.tmpl
    target_dir: "${WORKSPACE_ROOT}"
    mode: replace

  # ── DragonPow2 repo-owned overlay ──────────────────────────────────
  # These are intentionally project-specific and materialise inside DragonPow2,
  # not in the generic workspace governance layer.
  dragonpow2_root_agent_docs:
    enabled: true
    description: "DragonPow2 root AGENTS.md / CLAUDE.md overlay"
    sources:
      - governance/project-overlays/DragonPow2/root/AGENTS.md.tmpl
      - governance/project-overlays/DragonPow2/root/CLAUDE.md.tmpl
    target_dir: "${DRAGONPOW2_ROOT}"
    mode: replace

  dragonpow2_agent_doc_templates:
    enabled: true
    description: "DragonPow2 agent-doc template source"
    sources:
      - governance/project-overlays/DragonPow2/agent-docs/
    target_dir: "${DRAGONPOW2_ROOT}/governance"
    mode: replace

  dragonpow2_agent_doc_scripts:
    enabled: true
    description: "DragonPow2 agent-doc sync/check scripts"
    sources:
      - governance/project-overlays/DragonPow2/scripts/
    target_dir: "${DRAGONPOW2_ROOT}"
    mode: replace

  # ── Workspace skills (Codex mirror) ────────────────────────────────
  workspace_skills_codex:
    enabled: true
    description: "Codex-side mirror of shared workspace skills"
    sources:
      - governance/workspace-skills/shared/workspace-governance/
      - governance/workspace-skills/shared/skill-factory-playbook/
      - governance/workspace-skills/shared/feature-spec-workflow/
      - governance/workspace-skills/shared/github-sync-commit/
      - governance/workspace-skills/shared/dragonpow2-overlay-sync/
      - governance/workspace-skills/shared/browser-doc-crawler/
      - governance/workspace-skills/shared/karpathy-guidelines/
    target_dir: "${WORKSPACE_ROOT}/.codex/skills"
    mode: replace

  # ── Workspace skills (Claude mirror) ───────────────────────────────
  workspace_skills_claude:
    enabled: true
    description: "Claude-side mirror of shared workspace skills"
    sources:
      - governance/workspace-skills/shared/workspace-governance/
      - governance/workspace-skills/shared/skill-factory-playbook/
      - governance/workspace-skills/shared/feature-spec-workflow/
      - governance/workspace-skills/shared/github-sync-commit/
      - governance/workspace-skills/shared/dragonpow2-overlay-sync/
      - governance/workspace-skills/shared/browser-doc-crawler/
      - governance/workspace-skills/shared/karpathy-guidelines/
    target_dir: "${WORKSPACE_ROOT}/.claude/skills"
    mode: replace

  # ── Workspace skills (.agents mirror) ──────────────────────────────
  workspace_skills_agents:
    enabled: true
    description: "Harness-neutral mirror of shared workspace skills"
    sources:
      - governance/workspace-skills/shared/workspace-governance/
      - governance/workspace-skills/shared/skill-factory-playbook/
      - governance/workspace-skills/shared/feature-spec-workflow/
      - governance/workspace-skills/shared/github-sync-commit/
      - governance/workspace-skills/shared/dragonpow2-overlay-sync/
      - governance/workspace-skills/shared/browser-doc-crawler/
      - governance/workspace-skills/shared/karpathy-guidelines/
    target_dir: "${WORKSPACE_ROOT}/.agents/skills"
    mode: replace

  # ── Codex-only / Windows-only skill ────────────────────────────────
  workspace_skill_codex_superpowers_manager:
    enabled: true
    description: "Manage local superpowers whitelist for Codex on Windows"
    os: [windows]
    harness: [codex]
    sources:
      - governance/workspace-skills/codex-only/manage-superpowers-whitelist/
    target_dir: "${WORKSPACE_ROOT}/.codex/skills"
    mode: replace

  workspace_scripts_codex:
    enabled: true
    description: "Codex workspace helper scripts authored by this constitution"
    os: [windows]
    harness: [codex]
    sources:
      - governance/workspace-scripts/codex/manage-superpowers.bat
      - governance/workspace-scripts/codex/manage-superpowers.ps1
    target_dir: "${WORKSPACE_ROOT}/.codex/scripts"
    mode: replace

  # ── Per-harness configs ────────────────────────────────────────────
  workspace_config_codex:
    enabled: true
    description: "Codex workspace config (sandbox, project markers)"
    sources:
      - governance/workspace-config/codex.config.toml.tmpl
    target: "${WORKSPACE_ROOT}/.codex/config.toml"
    mode: replace

  # ── Global Codex reusable surfaces ─────────────────────────────────
  # These are user-level Codex role/skill snapshots that are safe to
  # materialise on a new machine. Runtime state, auth, logs, and .system
  # bundled skills are deliberately excluded.
  global_codex_agents:
    enabled: true
    description: "User-level Codex agent role definitions"
    sources:
      - governance/global/codex/agents/
    target_dir: "${USER_HOME}/.codex"
    mode: replace

  global_codex_skills:
    enabled: true
    description: "User-level Codex non-system skill snapshots"
    sources:
      - governance/global/codex/skills/
    target_dir: "${USER_HOME}/.codex"
    mode: replace

  global_codex_mcp_configs:
    enabled: true
    description: "User-level Codex MCP server templates with placeholders"
    sources:
      - governance/global/codex/mcp/mcp-servers.json
    target: "${USER_HOME}/.codex/mcp-configs/mcp-servers.json"
    mode: replace

  workspace_config_claude:
    enabled: true
    description: "Claude Code workspace settings (enabled plugins)"
    sources:
      - governance/workspace-config/claude.settings.local.json.tmpl
    target: "${WORKSPACE_ROOT}/.claude/settings.local.json"
    mode: replace

  workspace_config_claude_env:
    enabled: true
    description: "Claude Code plugin and settings recovery notes"
    sources:
      - governance/workspace-config/claude-env/README.md
      - governance/workspace-config/claude-env/plugins-inventory.md
      - governance/workspace-config/claude-env/settings-reference.json
      - governance/workspace-config/claude-env/restore-settings.sh
    target_dir: "${WORKSPACE_ROOT}/.claude/env"
    mode: replace

  global_claude_mcp_configs:
    enabled: true
    description: "User-level Claude MCP server templates with placeholders"
    sources:
      - governance/global/claude/mcp/mcp-servers.json
    target: "${USER_HOME}/.claude/mcp-configs/mcp-servers.json"
    mode: replace

  workspace_skills_lock:
    enabled: true
    description: "Pinned external workspace skill sources"
    sources:
      - manifests/skills-lock.json
    target: "${WORKSPACE_ROOT}/skills-lock.json"
    mode: replace

  # ── Global user-section in ~/.claude/CLAUDE.md ────────────────────
  # Inserted between <!-- USER:CONSTITUTION:START --> and <!-- USER:CONSTITUTION:END -->.
  # Other regions (OMC block, ECC block) are NOT touched.
  global_claude_user_section:
    enabled: true
    description: "User-authored Environment Correction + Issue Investigation Discipline"
    sources:
      - governance/global/claude/CLAUDE.md.partial.tmpl
    target: "${USER_HOME}/.claude/CLAUDE.md"
    mode: marker-section
    section_marker_start: "<!-- USER:CONSTITUTION:START"
    section_marker_end: "<!-- USER:CONSTITUTION:END -->"

  # Global user-section in ~/.codex/AGENTS.md.
  # Inserted between <!-- USER:CONSTITUTION:START --> and <!-- USER:CONSTITUTION:END -->.
  # Plugin-managed or locally generated superpowers blocks are NOT touched.
  global_codex_user_section:
    enabled: true
    description: "User-authored Codex home rules and superpowers activation policy"
    sources:
      - governance/global/codex/AGENTS.md.partial.tmpl
    target: "${USER_HOME}/.codex/AGENTS.md"
    mode: marker-section
    section_marker_start: "<!-- USER:CONSTITUTION:START"
    section_marker_end: "<!-- USER:CONSTITUTION:END -->"

backup:
  enabled: true
  suffix_format: ".backup.{TIMESTAMP}"   # ISO-8601 compact, e.g. .backup.20260429T132300Z

verify:
  on_install: true
  on_update: true
  fail_on_drift: false   # If true, verify exits non-zero when files differ from expected hashes.
