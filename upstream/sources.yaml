# Upstream sources to watch for documentation drift.
#
# Run:
#   ./scripts/upstream-watch.sh --check     # fetch + report diffs (no writes)
#   ./scripts/upstream-watch.sh --apply     # save new snapshots into upstream/docs/
#
# Workflow:
#   1. --check periodically (weekly/monthly).
#   2. If drift is reported, --apply to capture the new snapshot.
#   3. `git diff upstream/docs/` to read what changed upstream.
#   4. Decide whether to absorb the change into governance/.
#   5. If yes: edit governance/ files, bump VERSION, add CHANGELOG `Upstream` entry.
#   6. Commit and push.

policy:
  user_agent: "ai-workspace-constitution"
  timeout_seconds: 30

sources:
  # ── Anthropic / Claude ──────────────────────────────────────────────
  - id: anthropic-claude-code-best-practices
    url: https://www.anthropic.com/engineering/claude-code-best-practices
    type: html
    snapshot: upstream/docs/anthropic/claude-code-best-practices.html
    note: "Canonical 'best practices' page for Claude Code workflows."

  - id: anthropic-skills-readme
    url: https://raw.githubusercontent.com/anthropics/skills/main/README.md
    type: raw
    snapshot: upstream/docs/anthropic/skills-README.md
    note: "Official anthropics/skills repository overview."

  - id: anthropic-harness-design
    url: https://www.anthropic.com/engineering/harness-design-long-running-apps
    type: html
    snapshot: upstream/docs/anthropic/harness-design.html
    note: "GAN-style harness architecture (Planner/Generator/Evaluator)."

  # ── OpenAI / Codex ──────────────────────────────────────────────────
